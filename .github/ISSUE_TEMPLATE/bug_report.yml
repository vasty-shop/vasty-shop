name: Bug Report
description: Report a bug to help us improve Vasty Shop
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or error logs to help explain the problem.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (Frontend)
        - Mobile (iOS)
        - Mobile (Android)
        - Backend API
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker Compose
        - Manual (from source)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Vasty Shop Version
      description: What version of Vasty Shop are you running?
      placeholder: e.g., v0.1.0 or commit hash

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if web)
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
        - N/A (mobile or API)

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
