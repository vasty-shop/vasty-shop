# Development services for Vasty Shop.
#
# Defaults to the absolute minimum (Postgres + Redis + backend + frontend)
# so a fresh clone can boot with one command:
#
#   docker compose up -d
#
# Optional services are behind compose profiles. Opt in with one or more
# --profile flags. Example:
#
#   docker compose --profile meilisearch --profile minio up -d
#
# Available profiles:
#
#   qdrant       — Qdrant vector search (SEARCH_PROVIDER=qdrant)
#   meilisearch  — Meilisearch (SEARCH_PROVIDER=meilisearch, PR #22)
#   typesense    — Typesense  (SEARCH_PROVIDER=typesense,   PR #22)
#   minio        — MinIO S3-compatible storage (STORAGE_PROVIDER=minio, PR #26)
#   maildev      — local SMTP capture for dev (EMAIL_PROVIDER=smtp, PR #20)
#   ollama       — local LLMs (AI_PROVIDER=ollama, PR #15)
#
# See backend/docs/providers/ for per-provider setup guides and
# the setup wizard (`cd backend && npm run setup`) for interactive picking.

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vasty_shop_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "4005:4005"
      - "3002:3002"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5186:5186"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  # ---------- One-shot utilities ----------

  setup:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: ["npm", "run", "setup"]
    profiles: ["setup"]
    stdin_open: true
    tty: true
    volumes:
      - ./backend/.env:/app/.env
      - ./backend/.env.example:/app/.env.example
    working_dir: /app

  # ---------- Optional services (opt-in via --profile) ----------

  qdrant:
    image: qdrant/qdrant
    container_name: vasty-qdrant
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: vasty-meilisearch
    profiles: ["meilisearch"]
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data

  typesense:
    image: typesense/typesense:0.25.2
    container_name: vasty-typesense
    profiles: ["typesense"]
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: xyz
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data

  minio:
    image: minio/minio:latest
    container_name: vasty-minio
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  maildev:
    image: maildev/maildev:latest
    container_name: vasty-maildev
    profiles: ["maildev"]
    ports:
      - "1080:1080"
      - "1025:1025"

  ollama:
    image: ollama/ollama:latest
    container_name: vasty-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  meili_data:
  typesense_data:
  minio_data:
  ollama_data:
